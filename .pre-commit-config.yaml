repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: circular-imports
        name: circular-imports
        entry: python tools/check_circular_imports.py
        language: python
        additional_dependencies: [circular-import-detector]
        types: [python]
        pass_filenames: true
